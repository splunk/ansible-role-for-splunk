---
- name: Query cluster manager generation endpoint
  ansible.builtin.uri:
    url: "{{ splunk_uri_cm }}/services/cluster/manager/generation"
    method: GET
    user: "{{ splunk_admin_username }}"
    password: "{{ splunk_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ splunk_validate_certs | default(false) }}"
    return_content: true
    body: output_mode=json
  check_mode: false
  no_log: true
  changed_when: false
  failed_when: false
  register: cm_generation_response

- name: Set generation facts
  ansible.builtin.set_fact:
    _cm_generation: "{{ cm_generation_response.json.entry[0].content }}"
  when: cm_generation_response.status | default(-1) == 200

- name: Set generation facts on failure
  ansible.builtin.set_fact:
    _cm_generation: {}
  when: cm_generation_response.status | default(-1) != 200
