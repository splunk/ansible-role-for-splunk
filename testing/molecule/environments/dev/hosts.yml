---
# Development environment - single all-in-one node
# Fastest setup for quick testing and development
all:
  vars:
    ansible_user: ansible
  children:
    full:
      children:
        licensemaster:
          hosts:
            splunk-dev:
              # All-in-one: License master + Search Head + Indexer

        indexer:
          hosts:
            splunk-dev:

        search:
          hosts:
            splunk-dev:

    ansible_controller:
      hosts:
        ansible-controller:
          ansible_user: ansible
