---
# Molecule verify playbook
# Tests that the Splunk cluster is working correctly

- name: Verify Splunk services are running
  hosts: all:!git_server:!ansible_controller
  become: true
  tasks:
    - name: Check if Splunk service is running (full instances)
      systemd:
        name: splunk
      register: splunk_service_status
      when: "'full' in group_names"
      ignore_errors: true

    - name: Check if Splunk Universal Forwarder service is running
      systemd:
        name: splunkforwarder
      register: splunkforwarder_service_status
      when: "'uf' in group_names"
      ignore_errors: true

    - name: Verify Splunk is listening on management port
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 8089
        timeout: 60
      when: "'full' in group_names"
      ignore_errors: true

    - name: Verify Splunk web interface is accessible (search heads)
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 8000
        timeout: 60
      when: "'shcluster' in group_names"
      ignore_errors: true

- name: Verify cluster status
  hosts: clustermanager
  become: true
  become_user: splunk
  tasks:
    - name: Check cluster manager status
      command: /opt/splunk/bin/splunk show cluster-status -auth admin:changeme
      register: cluster_status
      failed_when: false
      changed_when: false

    - name: Display cluster status
      debug:
        var: cluster_status.stdout_lines
      when: cluster_status.stdout_lines is defined

- name: Verify search head cluster status
  hosts: shdeployer
  become: true
  become_user: splunk
  tasks:
    - name: Check search head cluster status
      command: /opt/splunk/bin/splunk show shcluster-status -auth admin:changeme
      register: shc_status
      failed_when: false
      changed_when: false

    - name: Display SHC status
      debug:
        var: shc_status.stdout_lines
      when: shc_status.stdout_lines is defined

- name: Verify Git server is accessible
  hosts: git_server
  tasks:
    - name: Check Git server web interface
      uri:
        url: "http://{{ ansible_host | default(inventory_hostname) }}:8929"
        method: GET
        status_code: [200, 302]
      register: git_check
      ignore_errors: true

    - name: Verify Git server response
      debug:
        msg: "Git server is accessible and responding"
      when: git_check.status is defined and git_check.status in [200, 302]
