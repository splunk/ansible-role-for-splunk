# Splunk Testing Framework Task Runner
# Architecture: Molecule-based scenarios (lab/day0/day1) with containerized execution
# Requirements: Docker only (all tools run in containers)
# Organization: setup:* (environment), lab:* (infrastructure), day0:* (deployment), day1:* (operations), workflow:* (combined cycles)

version: '3'

dotenv: ['.env']

env:

vars:
  PROJECT_ROOT: '{{.TASKFILE_DIR}}/..'
  DOCKER_IMAGES_DIR: '{{.TASKFILE_DIR}}/docker-images'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
      
  # === ENVIRONMENT SETUP ===
  setup:
   desc: Complete environment setup (secrets + images + software + network + runner)
   cmds:
     - task: setup:secrets
     - task: setup:images
     - task: download:splunk
     - task: network:create
     - task: runner:start
     - echo "✅ Environment setup complete!"
     - echo "💡 Run 'task infra:setup' to create containers and start testing"

  setup:images:
   desc: Build all Docker images required for testing (idempotent)
   cmds:
     - |
       echo "🔧 Checking/building Splunk testing framework images..."
       docker images | grep -q splunk-base-almalinux9 || docker build -t splunk-base-almalinux9:latest {{.DOCKER_IMAGES_DIR}}/almalinux9-systemd-sshd/
       docker images | grep -q splunk-base-ubuntu2204 || docker build -t splunk-base-ubuntu2204:latest {{.DOCKER_IMAGES_DIR}}/ubuntu2204-systemd-sshd/
       docker images | grep -q splunk-ansible-controller || docker build -t splunk-ansible-controller:latest {{.DOCKER_IMAGES_DIR}}/ansible-controller/
       docker images | grep -q splunk-git-server || docker build -t splunk-git-server:latest {{.DOCKER_IMAGES_DIR}}/gitlab/
       docker images | grep -q molecule-runner || docker build -t molecule-runner:latest {{.DOCKER_IMAGES_DIR}}/molecule-runner/
       echo "✅ All images ready!"
       echo "📝 Note: ansible-controller and molecule-runner images include Molecule v25.9.0rc1 (pre-release) for native inventory support"

  setup:secrets:
   desc: Create testing/.secrets directory with SSH keys and password (idempotent)
   dir: "{{.PROJECT_ROOT}}/testing"
   cmds:
     - |
       if [ -f .secrets/id_rsa ] && [ -f .secrets/ansible_password ]; then
         echo "✅ SSH secrets already exist"
       else
         mkdir -p .secrets && chmod 700 .secrets
         test -f .secrets/id_rsa || ssh-keygen -t rsa -b 2048 -N '' -C 'splunk-test-cluster' -f .secrets/id_rsa
         test -f .secrets/ansible_password || (tr -dc 'A-Za-z0-9' </dev/urandom | head -c 20 > .secrets/ansible_password)
         chmod 600 .secrets/id_rsa .secrets/ansible_password
         chmod 644 .secrets/id_rsa.pub
         echo "✅ SSH secrets created"
       fi

  network:create:
   desc: Create Docker network for testing (idempotent)
   cmds:
     - docker network ls | grep -q splunk-test-network || docker network create splunk-test-network
     - echo "✅ Network splunk-test-network ready"

  download:splunk:
   desc: "Download Splunk binaries to testing/software directory (idempotent)"
   dir: "{{.PROJECT_ROOT}}/testing"
   cmds:
     - |
       if [ -f software/splunk-9.1.2-b6b9c8185839-Linux-x86_64.tgz ] && [ -f software/splunkforwarder-9.1.2-b6b9c8185839-Linux-x86_64.tgz ]; then
         echo "✅ Splunk binaries already downloaded"
         ls -la software/
       else
         mkdir -p software
         echo "📥 Downloading Splunk Enterprise 9.1.2..."
         curl -L -o software/splunk-9.1.2-b6b9c8185839-Linux-x86_64.tgz "https://download.splunk.com/products/splunk/releases/9.1.2/linux/splunk-9.1.2-b6b9c8185839-Linux-x86_64.tgz"
         echo "📥 Downloading Splunk Universal Forwarder 9.1.2..."
         curl -L -o software/splunkforwarder-9.1.2-b6b9c8185839-Linux-x86_64.tgz "https://download.splunk.com/products/universalforwarder/releases/9.1.2/linux/splunkforwarder-9.1.2-b6b9c8185839-Linux-x86_64.tgz"
         echo "✅ Splunk binaries downloaded to testing/software/"
         ls -la software/
       fi

  # === MOLECULE SCENARIOS ===
  # These map directly to testing/molecule/ scenario directories
  # Note: getting-started scenario removed - native inventory now implemented

  # Lab scenario removed - consolidated into unified infrastructure approach

  # === INFRASTRUCTURE SCENARIO ===
  infra_small:test:
    desc: Run complete infra_small scenario (create → converge → verify → destroy)
    cmds:
      - task: setup
      - echo "🏗️ Running complete infrastructure scenario..."
      - |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v {{.PROJECT_ROOT}}:/workspace \
          -w /workspace/testing \
          -e HOST_PROJECT_DIRECTORY={{.PROJECT_ROOT}} \
          molecule-runner:latest \
          molecule test -s infra_small
      - echo "✅ Infrastructure scenario complete!"

  infra_small:create:
    desc: Create infrastructure containers
    cmds:
      - task: setup
      - echo "📦 Creating infrastructure containers..."
      - |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v {{.PROJECT_ROOT}}:/workspace \
          -w /workspace/testing \
          -e HOST_PROJECT_DIRECTORY={{.PROJECT_ROOT}} \
          molecule-runner:latest \
          molecule create -s infra_small

  infra_small:prepare:
    desc: Run prepare phase for infra_small scenario
    cmds:
      - echo "🔧 Running infra_small prepare phase..."
      - |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v {{.PROJECT_ROOT}}:/workspace \
          -w /workspace/testing \
          -e HOST_PROJECT_DIRECTORY={{.PROJECT_ROOT}} \
          molecule-runner:latest \
          molecule prepare -s infra_small

  infra_small:setup:
   desc: Setup infrastructure containers (create + prepare, no destroy)
   cmds:
     - task: infra_small:create
     - task: infra_small:prepare
     - echo "✅ Infrastructure setup complete (containers ready for day0_small)"

  infra_small:destroy:
   desc: Destroy infrastructure containers
   cmds:
     - echo "💥 Destroying infrastructure containers..."
     - |
       docker run --rm \
         -v /var/run/docker.sock:/var/run/docker.sock \
         -v {{.PROJECT_ROOT}}:/workspace \
         -w /workspace/testing \
         -e HOST_PROJECT_DIRECTORY={{.PROJECT_ROOT}} \
         molecule-runner:latest \
         molecule destroy -s infra_small

  # Lab destroy and status tasks removed - consolidated into infra scenario

  day0_small:test:
   desc: Run complete Day 0 small scenario (converge → verify)
   cmds:
     - echo "🚀 Day 0 Small - Running complete Splunk deployment scenario..."
     - |
       docker exec mol-run bash -c "
         cd /workspace/testing && \
         molecule test -s day0_small
       "
     - echo "✅ Day 0 Small scenario complete!"

  day0_small:converge:
   desc: Deploy Splunk via SSH (molecule converge -s day0_small)
   cmds:
     - echo "🚀 Day 0 Small - Deploying Splunk via SSH..."
     - |
       docker exec mol-run bash -c "
         cd /workspace/testing && \
         molecule converge -s day0_small
       "
     - echo "✅ Day 0 Small deployment complete!"

  day0_small:verify:
   desc: Verify Splunk deployment (molecule verify -s day0_small)
   cmds:
     - echo "🔍 Day 0 Small - Verifying Splunk deployment..."
     - |
       docker exec mol-run bash -c "
         cd /workspace/testing && \
         molecule verify -s day0_small
       "

  day0:playbook:
    desc: Deploy Splunk directly via ansible-playbook (bypasses molecule)
    cmds:
      - echo "🚀 Day 0 - Deploying Splunk via direct ansible-playbook..."
      - |
        docker run --rm \
          --network splunk-test-network \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v {{.PROJECT_ROOT}}:/workspace \
          -w /workspace \
          molecule-runner:latest \
          bash -c "ansible-galaxy collection install community.general && ansible-playbook -i testing/molecule/inventory/hosts.yml playbooks/splunk_install_or_upgrade.yml"

  day1:test:
    desc: Run complete Day 1 scenario (converge → verify)
    cmds:
      - task: setup
      - echo "🔧 Day 1 - Running complete operations scenario..."
      - |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v {{.PROJECT_ROOT}}:/workspace \
          -w /workspace/testing \
          -e HOST_PROJECT_DIRECTORY={{.PROJECT_ROOT}} \
          molecule-runner:latest \
          molecule test -s day1
      - echo "✅ Day 1 scenario complete!"

  day1:converge:
    desc: Run Day 1 operations (molecule converge -s day1)
    cmds:
      - echo "🔧 Day 1 - Running operational tasks..."
      - |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v {{.PROJECT_ROOT}}:/workspace \
          -w /workspace/testing \
          -e HOST_PROJECT_DIRECTORY={{.PROJECT_ROOT}} \
          molecule-runner:latest \
          molecule converge -s day1
      - echo "✅ Day 1 operations complete!"

  day1:verify:
    desc: Verify Day 1 operations (molecule verify -s day1)
    cmds:
      - echo "🔍 Day 1 - Verifying operational tasks..."
      - |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v {{.PROJECT_ROOT}}:/workspace \
          -w /workspace/testing \
          -e HOST_PROJECT_DIRECTORY={{.PROJECT_ROOT}} \
          molecule-runner:latest \
          molecule verify -s day1

  # === DIAGNOSTICS ===
  diag:terminal:
    desc: "Diagnose ttyd and nginx health"
    cmds:
      - |
          echo "🌐 Host check http://localhost:3000/ttyd"
          if command -v curl >/dev/null 2>&1; then
            curl -sS -o /dev/null -w 'HTTP %{http_code}\n' http://localhost:3000/ttyd || true
          else
            echo "curl not found, skipping host check"
          fi

          docker exec ansible-controller bash -c '
            echo "-- systemctl status ttyd --"; systemctl is-enabled ttyd || true; systemctl is-active ttyd || true; systemctl status --no-pager ttyd | sed -n "1,12p" || true
            echo "-- systemctl status nginx --"; systemctl is-enabled nginx || true; systemctl is-active nginx || true; systemctl status --no-pager nginx | sed -n "1,12p" || true
            echo "-- ss -ltnp for port 3000 --"; (ss -ltnp | grep ":3000" || true)
            echo "-- curl localhost:3000 (ttyd backend) --"; (curl -sS -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:3000 || true)
            echo "-- curl localhost:3000/ttyd (nginx proxy) --"; (curl -sS -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:3000/ttyd || true)
            echo "-- nginx configtest --"; nginx -t || true
          '

  diag:ssh:
    desc: "Test SSH connectivity to all hosts in the lab"
    cmds:
      - echo "🔍 Testing SSH connectivity to all hosts"
      - |
        docker exec -u ansible ansible-controller bash -c '
          echo "\n=== ANSIBLE PING USING INVENTORY ==="
          ansible -i /workspace/testing/molecule/inventory/hosts.yml full -m ping
          echo "\n=== SSH CONFIG ==="
          cat ~/.ssh/config
          echo "\n=== SSH KEYS ==="
          ls -la ~/.ssh/
          echo "\n=== TESTING SSH CONNECTIONS ==="
          for host in splunk-master splunk-license splunk-fwdmanager splunkapp-prod01 splunkapp-prod02 splunkshc-prod01 splunkshc-prod02 splunk-deploy splunk-uf01; do
            echo "\nTesting SSH to $host:"
            ssh -o StrictHostKeyChecking=no $host "hostname" || echo "Failed to connect to $host"
          done
        '

  # === UTILITIES ===
  controller:start:
    desc: "Start the ansible-controller container"
    cmds:
      - echo "🚀 Starting ansible-controller..."
      - |
        docker run -d --rm \
          --name ansible-controller \
          --network splunk-test-network \
          -p 3000:3000 \
          -v {{.PROJECT_ROOT}}:/workspace \
          -v {{.PROJECT_ROOT}}/testing/.secrets:/home/ansible/.secrets \
          -e HOST_PROJECT_DIRECTORY={{.PROJECT_ROOT}} \
          splunk-ansible-controller:latest
      - echo "✅ Controller started!"
      - echo "Access web terminal at http://localhost:3000/ttyd"

  controller:shell:
    desc: "Shell into ansible-controller container"
    cmds:
      - docker exec -it ansible-controller bash

  status:
    desc: Show status of all containers on splunk-test-network
    cmds:
      - echo "📋 Containers on splunk-test-network"
      - docker ps --filter network=splunk-test-network

  # Persistent Molecule runner for debugging
  runner:start:
   desc: "Start persistent molecule-runner (idempotent)"
   cmds:
     - |
       if docker ps --filter name=^mol-run$ --filter status=running | grep -q mol-run; then
         echo "✅ Molecule runner already running (container: mol-run)"
       else
         echo "🧹 Cleaning up any existing mol-run container..."
         docker rm -f mol-run 2>/dev/null || true
         echo "🚀 Starting persistent molecule-runner..."
         docker run -d \
           --name mol-run \
           --network splunk-test-network \
           -v /var/run/docker.sock:/var/run/docker.sock \
           -v {{.PROJECT_ROOT}}:/workspace \
           -w /workspace/testing \
           molecule-runner:latest \
           sleep infinity
         echo "✅ Molecule runner started (container: mol-run)"
       fi

  runner:shell:
    desc: "Shell into persistent molecule-runner (mol-run)"
    cmds:
      - docker exec -it mol-run bash

  runner:stop:
    desc: "Stop and remove persistent molecule-runner (mol-run)"
    cmds:
      - echo "🛑 Stopping molecule-runner..."
      - docker rm -f mol-run 2>/dev/null || true
      - echo "✅ Molecule runner stopped"

  reset:
    desc: Reset everything (destroy lab + clean Docker resources)
    cmds:
      - task: lab:destroy
      - echo "💥 Removing all containers and images..."
      - docker rm -f $(docker ps -a -q) 2>/dev/null || true
      - docker rmi -f $(docker images -q) 2>/dev/null || true
      - docker volume rm splunk-ws 2>/dev/null || true
      - echo "✅ Reset complete!"

  shell:
    desc: "Shell into container (usage: task shell -- container-name)"
    cmds:
      - docker exec -it {{.CLI_ARGS}} bash

  # === REMOTE ACCESS ===
  twingate:start:
    desc: "Start Twingate connector for external access"
    cmds:
      - |
        if [ -f .env ]; then
          export $(grep -v '^#' .env | xargs)
        fi
        if [ -n "$TWINGATE_NETWORK" ] && [ -n "$TWINGATE_ACCESS_TOKEN" ]; then
          echo "🚀 Starting Twingate connector..."
          docker run -d \
            --sysctl net.ipv4.ping_group_range="0 2147483647" \
            --network splunk-test-network \
            --env TWINGATE_NETWORK="$TWINGATE_NETWORK" \
            --env TWINGATE_ACCESS_TOKEN="$TWINGATE_ACCESS_TOKEN" \
            --env TWINGATE_REFRESH_TOKEN="$TWINGATE_REFRESH_TOKEN" \
            --env TWINGATE_LABEL_HOSTNAME="`hostname`" \
            --env TWINGATE_LABEL_DEPLOYED_BY="docker" \
            --name "twingate-connector" \
            --restart=unless-stopped \
            --pull=always \
            twingate/connector:1
          echo "✅ Twingate connector started!"
          echo "📋 Check status: docker logs twingate-connector"
          echo "🌐 Connector connected to splunk-test-network for container access"
        else
          echo "⚠️  TWINGATE_NETWORK or TWINGATE_ACCESS_TOKEN not set, skipping Twingate setup"
        fi

  twingate:stop:
    desc: "Stop Twingate connector"
    cmds:
      - echo "🛑 Stopping Twingate connector..."
      - docker stop twingate-connector || true
      - docker rm twingate-connector || true
      - echo "✅ Twingate connector stopped!"

  twingate:status:
    desc: "Show Twingate connector status"
    cmds:
      - docker ps --filter name=twingate-connector

  # === WORKFLOWS ===
  workflow:full:
   desc: Complete end-to-end workflow (infra_small → day0_small → day1 → destroy)
   cmds:
     - task: infra_small:setup
     - task: day0_small:test
     - task: day1:test
     - task: infra_small:destroy
     - echo "🎉 Complete end-to-end workflow finished!"

  workflow:quick:
   desc: Quick development cycle (infra_small + day0_small only, manual destroy)
   cmds:
     - task: infra_small:setup
     - task: day0_small:test
     - echo "✅ Quick development cycle complete!"
     - echo "💡 Run 'task infra_small:destroy' when done to clean up containers"

  # === DEVELOPMENT UTILITIES ===
  dev:shell:
    desc: Interactive shell in molecule-runner container
    cmds:
      - |
        docker run --rm -it \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v {{.PROJECT_ROOT}}:/workspace \
          -w /workspace/testing \
          -e HOST_PROJECT_DIRECTORY={{.PROJECT_ROOT}} \
          molecule-runner:latest \
          bash

  dev:cleanup:
    desc: Clean up Docker resources (containers, volumes, networks)
    cmds:
      - echo "🧹 Cleaning up Docker resources..."
      - docker system prune -f
      - docker volume prune -f
      - docker network prune -f
      - echo "✅ Cleanup complete!"